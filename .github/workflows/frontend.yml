name: Frontend

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # CI — ESLint + Next.js build (also type-checks TypeScript)
  # NEXT_PUBLIC_API_URL is pulled from the prod environment secret
  # because it is baked into the JS bundle at build time.
  # ─────────────────────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─────────────────────────────────────────────────────────────
  # CD — SCP repo to EC2, docker compose up --build.
  #
  # Secrets live in Settings → Environments → prod:
  #   EC2_HOST         — public IP / hostname of the EC2 instance
  #   EC2_USER         — SSH user (e.g. ubuntu)
  #   EC2_SSH_KEY      — private key (PEM contents)
  #   NEXT_PUBLIC_API_URL — e.g. https://api.example.com/api/v1
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint-and-build
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ~/invapp/frontend"

      - name: Copy repo to VM
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            -e "ssh -i ~/.ssh/deploy_key" \
            . ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/invapp/frontend/

      - name: Deploy frontend
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd ~/invapp/frontend && \
             docker compose down --remove-orphans || true && \
             NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
             docker compose up --build -d && \
             docker image prune -f"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
